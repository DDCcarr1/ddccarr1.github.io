<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minesweeper Mobile | DDCcarr1</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --cell-size: 35px;
            --cell-color: #333;
            --hidden-color: #444;
            --text-color: #eee;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            margin: 0;
            touch-action: manipulation;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            margin: 10px 0;
            font-size: 1.2rem;
            font-weight: bold;
            font-family: monospace;
        }

        .controls {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }

        .control-group { display: flex; flex-direction: column; }
        label { font-size: 0.7rem; margin-bottom: 3px; color: #aaa; text-transform: uppercase; }
        
        input {
            background: #333;
            border: 1px solid #444;
            color: white;
            padding: 8px;
            border-radius: 4px;
            font-size: 16px;
        }

        .grid-container {
            width: 100%;
            overflow: auto;
            display: flex;
            justify-content: center;
            padding: 10px 0 30px 0;
        }

        #grid {
            display: grid;
            gap: 2px;
            background: #000;
            padding: 2px;
            border: 4px solid #444;
            user-select: none;
            -webkit-user-select: none;
        }

        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            background: var(--hidden-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            font-size: calc(var(--cell-size) * 0.6);
        }

        .cell.revealed { background: var(--cell-color); cursor: default; }
        .cell.mine { background: #e74c3c; }
        .cell.flagged { background: #f1c40f; }

        /* Mode Toggle logic: Visible only on touch devices */
        #flag-toggle {
            display: none; 
            grid-column: 1 / -1;
            padding: 12px;
            font-weight: bold;
            border-radius: 4px;
            border: 2px solid #555;
            background: #444;
            color: white;
        }

        @media (pointer: coarse) {
            #flag-toggle { display: block; }
        }

        #flag-toggle.active {
            background: #f1c40f;
            color: #000;
            border-color: #d4ac0d;
        }

        #reset { 
            grid-column: 1 / -1;
            padding: 12px;
            background: #27ae60; 
            color: white; 
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="status-bar">
        <div>🚩 <span id="mine-count">0</span></div>
        <div>⏱️ <span id="timer">000</span></div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Rows</label>
            <input type="number" id="rows" value="10" min="1" max="50">
        </div>
        <div class="control-group">
            <label>Columns</label>
            <input type="number" id="cols" value="10" min="1" max="50">
        </div>
        <div class="control-group">
            <label>Percent Mines</label>
            <input type="number" id="percent" value="15" min="1" max="99">
        </div>
        <div class="control-group">
            <label>Size</label>
            <input type="number" id="size" value="35" min="20" max="100">
        </div>
        <button id="flag-toggle">MODE: DIG ⛏️</button>
        <button id="reset">NEW GAME</button>
    </div>

    <div class="grid-container">
        <div id="grid"></div>
    </div>

    <script>
        let config = { rows: 10, cols: 10, mines: 15 };
        let board = [];
        let gameOver = false;
        let flagMode = false;
        let timerInterval = null;
        let seconds = 0;
        let firstClick = true;

        const gridElement = document.getElementById('grid');
        const resetBtn = document.getElementById('reset');
        const flagToggle = document.getElementById('flag-toggle');
        const timerLabel = document.getElementById('timer');

        flagToggle.addEventListener('click', () => {
            flagMode = !flagMode;
            flagToggle.classList.toggle('active');
            flagToggle.innerText = flagMode ? "MODE: FLAG 🚩" : "MODE: DIG ⛏️";
        });

        function updateTimer() {
            seconds++;
            timerLabel.innerText = seconds.toString().padStart(3, '0');
        }

        function initGame() {
            clearInterval(timerInterval);
            seconds = 0;
            firstClick = true;
            timerLabel.innerText = "000";
            
            config.rows = Math.min(parseInt(document.getElementById('rows').value) || 10, 50);
            config.cols = Math.min(parseInt(document.getElementById('cols').value) || 10, 50);
            const percent = (parseInt(document.getElementById('percent').value) || 15) / 100;
            config.mines = Math.floor((config.rows * config.cols) * percent);
            const cellSize = document.getElementById('size').value;
            
            document.documentElement.style.setProperty('--cell-size', `${cellSize}px`);
            document.getElementById('mine-count').innerText = config.mines;
            
            gameOver = false;
            board = [];
            gridElement.innerHTML = '';
            gridElement.style.gridTemplateColumns = `repeat(${config.cols}, var(--cell-size))`;

            for (let r = 0; r < config.rows; r++) {
                board[r] = [];
                for (let c = 0; c < config.cols; c++) {
                    const cell = {
                        r, c, mine: false, revealed: false, flagged: false, count: 0,
                        element: document.createElement('div')
                    };
                    cell.element.classList.add('cell');
                    cell.element.addEventListener('click', () => {
                        if (firstClick && !flagMode) {
                            firstClick = false;
                            timerInterval = setInterval(updateTimer, 1000);
                        }
                        if (flagMode) toggleFlag(r, c);
                        else reveal(r, c);
                    });
                    cell.element.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        toggleFlag(r, c);
                    });
                    gridElement.appendChild(cell.element);
                    board[r][c] = cell;
                }
            }

            let planted = 0;
            while (planted < config.mines) {
                let r = Math.floor(Math.random() * config.rows);
                let c = Math.floor(Math.random() * config.cols);
                if (!board[r][c].mine) {
                    board[r][c].mine = true;
                    planted++;
                }
            }

            for (let r = 0; r < config.rows; r++) {
                for (let c = 0; c < config.cols; c++) {
                    if (board[r][c].mine) continue;
                    let count = 0;
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            if (board[r+dr]?.[c+dc]?.mine) count++;
                        }
                    }
                    board[r][c].count = count;
                }
            }
        }

        function reveal(r, c) {
            if (gameOver || board[r][c].revealed || board[r][c].flagged) return;
            const cell = board[r][c];
            cell.revealed = true;
            cell.element.classList.add('revealed');
            if (cell.mine) { endGame(false); return; }
            if (cell.count > 0) {
                cell.element.innerText = cell.count;
                cell.element.style.color = ['#3498db', '#2ecc71', '#e74c3c', '#9b59b6', '#f1c40f', '#1abc9c', '#34495e', '#7f8c8d'][cell.count-1];
            } else {
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        if (board[r+dr]?.[c+dc]) reveal(r+dr, c+dc);
                    }
                }
            }
            checkWin();
        }

        function toggleFlag(r, c) {
            if (gameOver || board[r][c].revealed) return;
            board[r][c].flagged = !board[r][c].flagged;
            board[r][c].element.classList.toggle('flagged');
            board[r][c].element.innerText = board[r][c].flagged ? '🚩' : '';
        }

        function checkWin() {
            const flat = board.flat();
            const win = flat.filter(c => !c.mine).every(c => c.revealed);
            if (win) endGame(true);
        }

        function endGame(win) {
            gameOver = true;
            clearInterval(timerInterval);
            board.flat().forEach(c => {
                if (c.mine) {
                    c.element.classList.add('mine');
                    c.element.innerText = '💣';
                }
            });
            setTimeout(() => alert(win ? `WIN! Time: ${seconds}s` : "BOOM!"), 100);
        }

        resetBtn.addEventListener('click', initGame);
        initGame();
    </script>
</body>
</html>
