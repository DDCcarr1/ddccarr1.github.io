<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Page Not Found | DDCcarr1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: space-between;
            overflow: hidden;
        }
        div {
            font-size: 50px;
            line-height: 1.2;
        }
        h1 {
            font-size: 100px;
            font-weight: bold;
        }
        h2 {
            font-size: 70px;
            margin: 0;
        }
        p {
            font-size: 0.8em;
        }
        #url-assist {
            font-size: 20px;
            word-break: break-all;
        }
        #url-display {
            color: #666;
            font-family: monospace;
            margin-top: 10px;
            font-size: 15px;
        }
        a {
            display: block;
            margin: 20px 0;
            font-size: 20px;
        }
        img {
            height: 100vh;
            transform: scaleX(-1);
        }
    </style>
</head>
<body>
    <div>
        <br><br><br>
        <h1>Page Not Found</h1>
        <p>We couldn't find the page you're looking for.</p>
        <br><br><br><br>
        <p id="url-assist">The URL you entered is:</p>
        <p id="url-display">URL Goes Here</p>
    </div>
    <img src="/images/shrug.jpg" alt="Shrug">
    <script>document.getElementById('url-display').innerText = window.location.href;</script>
</body>
</html>
