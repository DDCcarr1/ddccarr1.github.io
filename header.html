<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: #333;
            background-color: #f9f9f9;
        }

        header {
            background: #007BFF;
            color: white;
            padding: 20px 0;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 2.5em;
        }

        nav {
            background: #0056b3;
            padding: 10px 0;
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        nav ul li {
            margin: 0 15px;
        }

        nav ul li a {
            text-decoration: none;
            color: white;
            font-size: 1.2em;
        }

        nav ul li a:hover {
            text-decoration: underline;
        }

        main {
            padding: 30px;
            text-align: center;
        }

        main h2 {
            font-size: 2em;
            margin-bottom: 20px;
        }

        main p {
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 10px 0;
            margin-top: 30px;
        }

        footer p {
            margin: 0;
            font-size: 0.9em;
        }

        .button {
            display: inline-block;
            background: #007BFF;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 4px;
            font-size: 1.1em;
        }

        .button:hover {
            background: #0056b3;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }

            nav ul li a {
                font-size: 1em;
            }

            main p {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div id="header-container"></div>
    <header>
        <h1>DDCcarr1's Site</h1>
    </header>
    <nav>
        <ul>
            <li><a href="tdgames">TD Games</a></li>
            <li><a href="lottery">Lottery</a></li>
        </ul>
    </nav>
</body>
</html>
