<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TD Games</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
        }
        a {
            text-decoration: none;
            color: #000000;
        }
        select, button {
            padding: 10px;
            font-size: 1em;
            margin: 10px;
        }
        button {
            cursor: pointer;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #output {
            margin-top: 20px;
            font-size: 1.5em;
            color: #333;
        }
        footer {
            margin-top: 50px;
            font-size: 0.9em;
            color: #666;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <h1>TD Games - Fun Questions with Friends</h1>
    <p>Choose a Category and a Rating, then click Play!</p>
    
    <label for="optionSelect">Category</label>
    <select id="optionSelect">
        <option value="truth">Truth</option>
        <option value="dare">Dare</option>
        <option value="wyr">Would You Rather</option>
        <option value="nhie">Never Have I Ever</option>
        <option value="paranoia">Who's Most Likely To</option>
        <option value="random">Random</option>
    </select>

    <label for="ratingSelect" class="hidden">Rating</label>
    <select id="ratingSelect" class="hidden">
        <option value="">Default (PG/PG13)</option>
        <option value="?rating=pg">PG</option>
        <option value="?rating=pg13">PG-13</option>
        <option value="?rating=r">R</option>
        <option value="random">Random</option>
    </select>
    
    <button id="fetchButton">Play!</button>
    <div id="output"></div>
    
    <footer id="footer">Due to an API Issue, the rating is stuck as <a href='/tdgames?secure'>PG.</a></footer>

    <script>
        // Function to get URL parameters
        function getUrlParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.has(name);
        }

        document.addEventListener("DOMContentLoaded", () => {
            const footer = document.getElementById('footer');
            const ratingLabel = document.querySelector('label[for="ratingSelect"]');
            const ratingSelect = document.getElementById('ratingSelect');

            // Check if the URL contains ?secure
            const isSecure = getUrlParameter('secure');

            if (isSecure) {
                // Hide the footer and show the rating selector
                footer.classList.add('hidden');
                ratingLabel.classList.remove('hidden');
                ratingSelect.classList.remove('hidden');
            } else {
                // Show the footer and hide the rating selector
                footer.classList.remove('hidden');
                ratingLabel.classList.add('hidden');
                ratingSelect.classList.add('hidden');
            }
        });

        // Fetch and display the game question
        document.getElementById('fetchButton').addEventListener('click', () => {
            const optionSelect = document.getElementById('optionSelect');
            const ratingSelect = document.getElementById('ratingSelect');
            const selectedOption = optionSelect.value;
            const selectedRating = ratingSelect.value;
            const outputDiv = document.getElementById('output');
            outputDiv.textContent = 'Loading...';

            // Handle "Random" option for category
            let finalOption = selectedOption;
            if (selectedOption === 'random') {
                const options = Array.from(optionSelect.options)
                    .filter(option => option.value !== 'random')
                    .map(option => option.value);
                finalOption = options[Math.floor(Math.random() * options.length)];
            }

            // Handle "Random" option for rating
            let finalRating = selectedRating;
            if (selectedRating === 'random') {
                const ratings = Array.from(ratingSelect.options)
                    .filter(option => option.value !== 'random' && option.value !== '')
                    .map(option => option.value);
                finalRating = ratings[Math.floor(Math.random() * ratings.length)];
            }

            // Construct the API URL based on the selected option and rating
            const apiUrl = `https://api.truthordarebot.xyz/api/${finalOption}${finalRating}`;

            fetch(apiUrl)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! Status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    // Extract the selected category and rating labels
                    const categoryLabel = optionSelect.options[optionSelect.selectedIndex].text;
                    const ratingLabel = ratingSelect.options[ratingSelect.selectedIndex]?.text || 'Default';

                    // Display the category, rating, and question in the output
                    outputDiv.textContent = `${data.type} (${data.rating}): ${data.question || 'No prompt found!'}`;
                })
                .catch(error => {
                    outputDiv.textContent = `Error Occured, Try Again`;
                });
        });
    </script>
</body>
</html>
