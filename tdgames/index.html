<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TD Games</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
        }
        select, button {
            padding: 10px;
            font-size: 1em;
            margin: 10px;
        }
        button {
            cursor: pointer;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #output {
            margin-top: 20px;
            font-size: 1.5em;
            color: #333;
        }
    </style>
</head>
<body>
    <h1>TD Games - Fun Questions with Friends</h1>
    <p>Choose a Catagory and a Rating, then click Play!</p>
    
    <label for="optionSelect">Catagory</label>
    <select id="optionSelect">
        <option value="truth">Truth</option>
        <option value="dare">Dare</option>
        <option value="wyr">Would You Rather</option>
        <option value="nhie">Never Have I Ever</option>
        <option value="paranoia">Who's Most Likely To</option>
    </select>

    <label for="ratingSelect">Rating</label>
    <select id="ratingSelect">
        <option value="">Default (PG/PG13)</option>
        <option value="?rating=pg">PG</option>
        <option value="?rating=pg13">PG-13</option>
        <option value="?rating=r">R</option>
    </select>
    
    <button id="fetchButton">Play!</button>
    <div id="output"></div>

    <script>
        document.getElementById('fetchButton').addEventListener('click', () => {
            const selectedOption = document.getElementById('optionSelect').value;
            const selectedRating = document.getElementById('ratingSelect').value;
            const outputDiv = document.getElementById('output');
            outputDiv.textContent = 'Loading...';

            // Construct the API URL based on the selected option and rating
            const apiUrl = `https://api.truthordarebot.xyz/api/${selectedOption}${selectedRating}`;

            fetch(apiUrl)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! Status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    outputDiv.textContent = data.question || 'No prompt found!';
                })
                .catch(error => {
                    outputDiv.textContent = `Error fetching prompt: ${error.message}`;
                });
        });
    </script>
</body>
</html>
