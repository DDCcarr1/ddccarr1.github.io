<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TD Games</title>
    <style>
        body {
            font-family: Verdana;
            text-align: center;
            margin: 20px;
        }
        select, button {
            padding: 10px;
            font-size: 1em;
            margin: 10px;
        }
        button {
            cursor: pointer;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #output {
            margin-top: 20px;
            font-size: 1.5em;
            color: #333;
        }
        a {
            color: #000000;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>TD Games - Fun Questions with Friends</h1>
    <p>Choose a Catagory and a Rating, then click Play!</p>
    
    <label for="optionSelect">Catagory</label>
    <select id="optionSelect">
        <option value="truth">Truth</option>
        <option value="dare">Dare</option>
        <option value="wyr">Would You Rather</option>
        <option value="nhie">Never Have I Ever</option>
        <option value="paranoia">Who's Most Likely To</option>
        <option value="random">Random</option>
    </select>

    <label for="ratingSelect" id="ratingLabel" style="display: none;">Rating</label>
    <select id="ratingSelect" style="display: none;">
        <option value="">Default (PG/PG13)</option>
        <option value="?rating=pg">PG</option>
        <option value="?rating=pg13">PG-13</option>
        <option value="?rating=r">R</option>
        <option value="random">Random</option>
    </select>
    
    <button id="fetchButton">Play!</button>
    <div id="output"></div>

    <script>
        // Function to check if a URL parameter exists
        function hasUrlParameter(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.has(param);
        }

        // Handle visibility of the rating selector based on the "secure=true" parameter
        const ratingSelect = document.getElementById('ratingSelect');
        const ratingLabel = document.getElementById('ratingLabel');
        const secureMode = hasUrlParameter('secure');

        if (secureMode) {
            ratingSelect.style.display = 'inline';
            ratingLabel.style.display = 'inline';
        }

        document.getElementById('fetchButton').addEventListener('click', () => {
            const optionSelect = document.getElementById('optionSelect');
            const selectedOption = optionSelect.value;
            const outputDiv = document.getElementById('output');
            outputDiv.textContent = 'Loading...';

            // Handle "Random" option for category
            let finalOption = selectedOption;
            if (selectedOption === 'random') {
                const options = Array.from(optionSelect.options)
                    .filter(option => option.value !== 'random')
                    .map(option => option.value);
                finalOption = options[Math.floor(Math.random() * options.length)];
            }

            // Handle rating based on secure mode
            let finalRating = secureMode ? ratingSelect.value : '?rating=pg';
            if (secureMode && finalRating === 'random') {
                const ratings = Array.from(ratingSelect.options)
                    .filter(option => option.value !== 'random' && option.value !== '')
                    .map(option => option.value);
                finalRating = ratings[Math.floor(Math.random() * ratings.length)];
            }

            // Construct the API URL based on the selected option and rating
            const apiUrl = `https://api.truthordarebot.xyz/api/${finalOption}${finalRating}`;

            fetch(apiUrl)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! Status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    // Extract the selected category and rating labels
                    const categoryLabel = optionSelect.options[optionSelect.selectedIndex].text;
                    const ratingLabel = secureMode 
                        ? ratingSelect.options[ratingSelect.selectedIndex].text 
                        : 'PG';
                
                    // Display the category, rating, and question in the output
                    outputDiv.textContent = `${data.type || 'Error'} (${data.rating || 'Error'}): ${data.question || 'Error Occured- Try Again'}`;
                })
                .catch(error => {
                    outputDiv.textContent = `Error Occured- Try Again`;
                });
        });
    </script>
    <p>Due to restrictions with the API, questions must be <a href="/tdgames?secure=true">PG</a>.</p>
</body>
</html>
